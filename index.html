<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблица операций</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">

<h1 class="text-3xl font-bold text-center mb-8">📊 Таблица операций</h1>

<div class="bg-slate-800 p-6 rounded-2xl text-sm font-mono whitespace-pre-wrap max-h-[70vh] overflow-auto">
  <strong>Debug info:</strong><br><br>
  URL: <span id="url"></span><br><br>
  Data length: <span id="length"></span><br><br>
  Raw data:<br>
  <span id="data"></span>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor("#0f172a");
  tg.setBackgroundColor("#0f172a");

  document.getElementById("url").textContent = window.location.href;

  const urlParams = new URLSearchParams(window.location.search);
  const encoded = urlParams.get('data');

  document.getElementById("length").textContent = encoded ? encoded.length : 0;

  if (encoded) {
    try {
      const decoded = atob(encoded);
      document.getElementById("data").innerHTML = decoded.substring(0, 1500) + (decoded.length > 1500 ? "..." : "");
    } catch (e) {
      document.getElementById("data").innerHTML = "Decode error: " + e.message;
    }
  } else {
    document.getElementById("data").innerHTML = "Параметр data не найден в URL";
  }

  tg.MainButton.setText("Закрыть");
  tg.MainButton.show();
  tg.MainButton.onClick(() => tg.close());
</script>

</body>
</html>
