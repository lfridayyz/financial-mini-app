<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблица операций</title>
  <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2.0/dist/js/tabulator.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .tabulator { background: #1e2937; color: white; border-radius: 12px; }
  </style>
</head>
<body class="p-4">

<div class="max-w-6xl mx-auto">
  <h1 class="text-3xl font-bold text-center mb-6">📊 Таблица операций</h1>
  
  <div id="debug" class="text-xs text-gray-400 mb-4 text-center"></div>
  <div id="table" class="shadow-2xl"></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor("#0f172a");
  tg.setBackgroundColor("#0f172a");

  const urlParams = new URLSearchParams(window.location.search);
  const encoded = urlParams.get('data');

  let tableData = [];

  document.getElementById("debug").innerHTML = `📡 Получено данных: ${encoded ? encoded.length : 0} символов`;

  if (encoded) {
    try {
      tableData = JSON.parse(atob(encoded));
      document.getElementById("debug").innerHTML += `<br>✅ Успешно декодировано: ${tableData.length} строк`;
    } catch (e) {
      document.getElementById("debug").innerHTML += `<br>❌ Ошибка декодирования: ${e.message}`;
    }
  } else {
    document.getElementById("debug").innerHTML += `<br>❌ Параметр data не найден в URL`;
  }

  if (tableData.length === 0) {
    document.getElementById("table").innerHTML = `
      <div class="text-center py-20 text-gray-400">
        <p class="text-6xl mb-4">📭</p>
        <p>Нет данных. Попробуйте сгенерировать отчёт заново.</p>
      </div>`;
  } else {
    new Tabulator("#table", {
      data: tableData,
      layout: "fitColumns",
      pagination: "local",
      paginationSize: 20,
      columns: [
        { title: "Дата", field: "date", sorter: "date", width: 110 },
        { title: "Категория", field: "category", sorter: "string", headerFilter: "input" },
        { 
          title: "Сумма ₽", 
          field: "amount", 
          sorter: "number",
          formatter: function(cell) {
            const val = cell.getValue();
            return val >= 0 
              ? `<span class="text-green-400">+${val.toLocaleString('ru-RU')}</span>` 
              : `<span class="text-red-400">${val.toLocaleString('ru-RU')}</span>`;
          }
        },
        { title: "Комментарий", field: "comment", sorter: "string", headerFilter: "input" }
      ],
      initialSort: [{column: "date", dir: "desc"}]
    });
  }

  tg.MainButton.setText("Закрыть");
  tg.MainButton.show();
  tg.MainButton.onClick(() => tg.close());
</script>

</body>
</html>
